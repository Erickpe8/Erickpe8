name: Generate Snake Animation

on:
  # Run automatically every 24 hours
  schedule:
    - cron: "0 0 * * *"

  # Allow manual execution
  workflow_dispatch:

  # Run on pushes to main branch
  push:
    branches:
      - main
    paths:
      - .github/workflows/generate-snake.yml
      - README.md

concurrency:
  group: snake
  cancel-in-progress: true

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      SNAKE_SLOWDOWN_FACTOR: "1.8"

    steps:
      - name: Generate contribution snake SVGs
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Slow down snake animation
        run: |
          python - << 'PY'
          from pathlib import Path
          import os
          import re

          factor = float(os.environ.get("SNAKE_SLOWDOWN_FACTOR", "1.8"))
          files = [
              Path("dist/github-contribution-grid-snake.svg"),
              Path("dist/github-contribution-grid-snake-dark.svg"),
          ]

          dur_pattern = re.compile(r'dur="([0-9]*\.?[0-9]+)(ms|s)"')

          def repl(match):
              value = float(match.group(1)) * factor
              unit = match.group(2)
              if unit == "ms":
                  return f'dur="{int(round(value))}ms"'
              return f'dur="{value:.3f}s"'

          for file in files:
              if not file.exists():
                  continue
              content = file.read_text(encoding="utf-8")
              updated = dur_pattern.sub(repl, content)
              file.write_text(updated, encoding="utf-8")
              print(f"Patched speed in {file}")
          PY

      - name: Push snake SVGs to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
